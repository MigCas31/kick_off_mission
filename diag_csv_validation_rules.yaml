---

# Diagnostic CSV Templates Validation and Automation Rules

## Metadata
folder_pattern: "diag_csv/*/"
template_folder: "template/"
required_files:
  - tasks_template.csv
  - variables_template.csv
  - enums_template.csv
  - catalogues_template.csv
  - generators_template.csv

## Joint Keys (variables_template.*_ref references *_key in the other template)
joint_keys:
  - template: note_types_template.csv
    key_column: note_type_key
    variables_ref: note_type_ref
    description: "variables.note_type_ref -> note_types.note_type_key; note_type_key is required in note_types_template; note_type_ref required when applicable in variables_template"
  - template: generators_template.csv
    key_column: generator_key
    variables_ref: generator_ref
    description: "variables.generator_ref -> generators.generator_key; required when applicable in variables_template"
  - template: catalogues_template.csv
    key_column: catalogue_key
    variables_ref: catalogue_ref
    description: "variables.catalogue_ref -> catalogues.catalogue_key; required when applicable in variables_template"

## CSV File Schemas

### tasks_template.csv
columns:
  - name: task_id
    type: string
    required: true
    unique: true
    description: "Unique identifier for the task (e.g., admin_001, admin_002)"
    example: "admin_023"
  
  - name: task_name
    type: string
    required: true
    description: "Human-readable task name in English"
    example: "Lead Report Mission Configuration"
  
  - name: task_description
    type: string
    required: true
    description: "Detailed description of what the task does"
    no_commas: true
    example: "Configure mission type analysis scope property purpose and occupant information for lead report"
  
  - name: pattern
    type: enum
    required: true
    values: ["form", "checklist_with_answers", "checklist_with_evidence", "catalogue_registration", "observation_capture"]
    example: "form"
  
  - name: lifecycle_phase
    type: enum
    required: true
    values: ["offsite-pre", "onsite", "offsite-post"]
    example: "offsite-pre"
  
  - name: lifecycle_level
    type: enum
    required: true
    values: ["case", "report", "building", "storey", "room"]
    example: "case"
  
  - name: lifecycle_moment
    type: enum
    required: true
    values: ["before_arriving", "on_creation", "on_overview", "on_completion", "annotation_mode"]
    example: "before_arriving"
  
  - name: stage
    type: string
    required: true
    description: "Stage identifier (e.g., 1.A, 2.C)"
    example: "1.A"
  
  - name: step
    type: string
    required: true
    description: "Step identifier (e.g., case.selection, room.overview)"
    example: "case.selection"
  
  - name: requiredness
    type: enum
    required: true
    values: ["always", "optional", "always_if"]
    example: "always_if"
  
  - name: condition
    type: string
    required: false
    description: "Condition expression if requiredness=always_if"
    example: "report_type_selection includes french_lead"
    validation: "Must be set if requiredness=always_if"
  
  - name: has_coverage_rules
    type: boolean
    required: true
    values: ["true", "false"]
    example: "false"
  
  - name: coverage_rules_description
    type: string
    required: false
    description: "Description of coverage rules if applicable"
    example: ""
  
  - name: ui_type
    type: enum
    required: true
    values: ["form", "checklist_with_answers", "catalogue_registration", "generator"]
    example: "form"
  
  - name: note_type_keys
    type: string
    required: false
    description: "Comma-separated note type keys"
    example: ""
  
  - name: catalogue_key
    type: string
    required: false
    description: "Reference to catalogue if ui_type=catalogue_registration"
    foreign_key: "catalogues_template.csv.catalogue_key"
    validation: "Must exist if ui_type=catalogue_registration"
    example: ""
  
  - name: generator_key
    type: string
    required: false
    description: "Reference to generator if ui_type=generator"
    foreign_key: "generators_template.csv.generator_key"
    validation: "Must exist if ui_type=generator"
    example: ""

### variables_template.csv
columns:
  - name: variable_key
    type: string
    required: true
    unique: true
    description: "Unique identifier for the variable"
    example: "mission_analysis_scope"
  
  - name: label_en
    type: string
    required: true
    description: "English label for the variable"
    example: "Mission Analysis Scope"
  
  - name: label_fr
    type: string
    required: true
    description: "French label for the variable"
    example: "Perimetre d'analyse de la mission"
  
  - name: description
    type: string
    required: true
    description: "Detailed description (MUST NOT contain commas - use semicolons instead)"
    no_commas: true
    example: "Scope of analysis for the mission (private parts; occupied parts; common parts)"
  
  - name: task_key
    type: string
    required: true
    foreign_key: "tasks_template.csv.task_id"
    description: "Reference to task_id in tasks_template.csv"
    example: "admin_023"
  
  - name: variable_kind
    type: enum
    required: true
    values: ["boolean", "number", "string", "rich_text", "enum_single", "enum_multiple", "tags", "catalogue", "generator", "computed"]
    validation: "Must be one of: boolean, number, string, enum_single, enum_multiple"
    example: "enum_multiple"
  
  - name: value_source_type
    type: enum
    required: true
    values: ["user_input", "static_default", "inherited", "system_provided", "computed", "derived"]
    validation: "Must be one of: user_input, static_default, inherited, computed"
    example: "user_input"
  
  - name: level_registered_at
    type: enum
    required: true
    values: ["case", "report", "property", "building", "storey", "room", "building_element", "object"]
    description: "Level where variable is registered. Must be one of: case, report, property, building, storey, room, building_element, object"
    example: "case"
    validation: "Must be a valid hierarchy level value"
  
  - name: level_belongs_to
    type: enum
    required: true
    values: ["case", "report", "property", "building", "storey", "room", "building_element", "object"]
    description: "Level the variable belongs to. Must be one of: case, report, property, building, storey, room, building_element, object"
    example: "case"
    validation: "Must be a valid hierarchy level value"
  
  - name: standard_key
    type: string
    required: false
    description: "Reference to standard if applicable"
    example: ""
  
  - name: required_default
    type: boolean
    required: true
    values: ["true", "false"]
    example: "true"
  
  - name: required_in_pdf
    type: boolean
    required: false
    values: ["True", "False", "true", "false"]
    description: "Whether the variable must appear in generated PDF output"
    example: "False"
  
  - name: required_if
    type: string
    required: false
    description: "Condition for required status"
    example: "minors_present=true"
  
  - name: enum_ref
    type: string
    required: false
    foreign_key: "enums_template.csv.enum_key"
    description: "Reference to enum_key in enums_template.csv (required if variable_kind is enum_single or enum_multiple)"
    validation: "Must exist if variable_kind in [enum_single, enum_multiple]"
    example: "mission_analysis_scope"
  
  - name: catalogue_ref
    type: string
    required: false
    foreign_key: "catalogues_template.csv.catalogue_key"
    example: ""
  
  - name: generator_ref
    type: string
    required: false
    foreign_key: "generators_template.csv.generator_key"
    description: "Joint key: reference to generator_key (required when applicable)"
    example: ""
  
  - name: note_type_ref
    type: string
    required: false
    foreign_key: "note_types_template.csv.note_type_key"
    description: "Joint key: reference to note_type_key (required when applicable)"
    example: ""
  
  - name: unit
    type: string
    required: false
    description: "Unit of measurement if applicable"
    example: ""
  
  - name: status
    type: enum
    required: false
    values: ["draft", "final", "deprecated"]
    default: "draft"
    description: "Status of variable (optional)"
    example: "draft"

