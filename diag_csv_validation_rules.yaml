## Validation Rules

rules:
  - id: csv_format_validation
    name: "CSV Format Validation"
    description: "Commas must only be used as column separators, never inside column values"
    severity: error
    check: "No commas inside column values"
    action: "Replace commas with semicolons in column values (especially description fields)"
    example_bad: "Scope of analysis (private parts, occupied parts, common parts)"
    example_good: "Scope of analysis (private parts; occupied parts; common parts)"
    applies_to: ["variables_template.csv.description", "tasks_template.csv.task_description"]
  
  - id: enum_variable_validation
    name: "Enum Variable Validation"
    description: "All enum variables must reference valid enums with sufficient items"
    severity: error
    check: |
      1. Extract all enum_ref values from variables_template.csv where variable_kind in [enum_single, enum_multiple]
      2. Extract all unique enum_key values from enums_template.csv
      3. Verify each enum_ref exists in enum_key list
      4. Count items for each enum_ref
      5. Report variables referencing enums with <= 1 items
    action: "Report missing enum_ref or enums with insufficient items"
    skill: "enum_variable_audit"
  
  - id: enum_completeness_check
    name: "Enum Completeness Check"
    description: "Return the name of enum type variables that has 1 or None item_values assigned in the enum_template.csv"
    severity: warning
    check: |
      For each enum_ref in variables:
        - Count items in enums_template.csv where enum_key == enum_ref
        - If count <= 1, flag variable_key
    action: "List variable_key values for incomplete enums"
    output_format: "List of variable_key values"
  
  - id: task_variable_consistency
    name: "Task-Variable Consistency"
    description: "All task_key values must exist in tasks_template.csv"
    severity: error
    check: "All task_key in variables_template.csv exist as task_id in tasks_template.csv"
    action: "Report orphaned variables"
  
  - id: ui_type_consistency
    name: "UI Type Consistency"
    description: "Tasks with catalogue/generator UI types must have valid references"
    severity: error
    check: |
      - If ui_type=catalogue_registration, catalogue_key must exist in catalogues_template.csv
      - If ui_type=generator, generator_key must exist in generators_template.csv
    action: "Report missing catalogue_key or generator_key references"
  
  - id: required_field_validation
    name: "Required Field Validation"
    description: "Conditional requiredness must have conditions"
    severity: error
    check: |
      - If requiredness=always_if in tasks, condition must be populated
      - If required_if is set in variables, condition must be valid
    action: "Report missing conditions"
  
  - id: enum_item_value_format
    name: "Enum Item Value Format"
    description: "All item_value fields must be in English, lowercase, with underscores"
    severity: error
    check: "item_value matches pattern: lowercase English with underscores"
    pattern: "^[a-z][a-z0-9_]*$"
    action: "Normalize enum item values to this format"
    example_bad: "Private Parts"
    example_good: "private_parts"
  
  - id: description_field_format
    name: "Description Field Format"
    description: "Description fields must not contain commas"
    severity: error
    check: "Check if the comma is not used inside a column value but to split the column because we work on .csv file"
    action: "Replace commas with semicolons in description fields"
    applies_to: ["variables_template.csv.description"]
  
  - id: primary_key_uniqueness
    name: "Primary Key Uniqueness"
    description: "Primary keys must be unique"
    severity: error
    checks:
      - "task_id must be unique in tasks_template.csv"
      - "variable_key must be unique in variables_template.csv"
      - "enum_key + item_value combination must be unique in enums_template.csv"
    action: "Report duplicates"
  
  - id: variable_level_validation
    name: "Variable Level Validation"
    description: "level_registered_at and level_belongs_to must contain valid hierarchy level values"
    severity: error
    check: |
      For each row in variables_template.csv:
        - Verify level_registered_at is in [case, report, property, building, storey, room, building_element, object]
        - Verify level_belongs_to is in [case, report, property, building, storey, room, building_element, object]
        - Report any variables with invalid level values
    action: "Report variables with invalid level_registered_at or level_belongs_to values"
    applies_to: ["variables_template.csv.level_registered_at", "variables_template.csv.level_belongs_to"]
  
  - id: joint_keys_ref_validation
    name: "Joint Keys Reference Validation (enum_ref, catalogue_ref, generator_ref, note_type_ref)"
    description: "All *_ref in variables_template must reference existing *_key in the corresponding template"
    severity: error
    check: |
      1. enum_ref (if not empty) -> must exist in enums_template.csv.enum_key
      2. catalogue_ref (if not empty) -> must exist in catalogues_template.csv.catalogue_key
      3. generator_ref (if not empty) -> must exist in generators_template.csv.generator_key
      4. note_type_ref (if not empty) -> must exist in note_types_template.csv.note_type_key
    action: "Report any *_ref that doesn't exist in its respective reference table"
    applies_to: ["variables_template.csv.enum_ref", "variables_template.csv.catalogue_ref", "variables_template.csv.generator_ref", "variables_template.csv.note_type_ref"]
    skill: "reference_integrity_check"
  
  - id: variable_kind_restricted_validation
    name: "Variable Kind Restricted Validation"
    description: "variable_kind must be one of: boolean, number, string, enum_single, enum_multiple"
    severity: error
    check: |
      For each row in variables_template.csv:
        - Verify variable_kind is in [boolean, number, string, enum_single, enum_multiple]
        - Report any variables with invalid variable_kind values
    action: "Report variables with invalid variable_kind values (must be boolean, number, string, enum_single, or enum_multiple)"
    applies_to: ["variables_template.csv.variable_kind"]
  
  - id: value_source_type_restricted_validation
    name: "Value Source Type Restricted Validation"
    description: "value_source_type must be one of: user_input, static_default, inherited, computed"
    severity: error
    check: |
      For each row in variables_template.csv:
        - Verify value_source_type is in [user_input, static_default, inherited, computed]
        - Report any variables with invalid value_source_type values
    action: "Report variables with invalid value_source_type values (must be user_input, static_default, inherited, or computed)"
    applies_to: ["variables_template.csv.value_source_type"]
  
  - id: required_files_structure_validation
    name: "Required Files and Structure Validation"
    description: "Each folder in diag_csv must have all required CSV files from template folder, and each CSV structure must match template structure"
    severity: error
    check: |
      1. For each folder in diag_csv/*/:
         - Verify all required files exist: tasks_template.csv, variables_template.csv, enums_template.csv, catalogues_template.csv, generators_template.csv
         - Files may be empty (only headers) but must exist
         - For each CSV file:
           a. Read header row from template folder CSV
           b. Read header row from diag_csv folder CSV
           c. Compare column names (order may differ, but all columns must match)
           d. Report missing files or structure mismatches
      2. Report:
         - Folders missing required CSV files
         - CSV files with column structure that doesn't match template
         - Missing columns in CSV files
         - Extra columns in CSV files (if not allowed)
    action: "Report folders with missing files or CSV files with structure mismatches"
    applies_to: ["diag_csv/*/"]

## Hooks

hooks:
  - name: pre_save_validation
    trigger: "Before saving any CSV file in diag_csv/**/"
    rules:
      - required_files_structure_validation
      - csv_format_validation
      - enum_variable_validation
      - description_field_format
      - primary_key_uniqueness
    actions:
      - "Verify required files exist and structure matches template"
      - "Run CSV format validation"
      - "Check enum references"
      - "Sanitize description fields"
      - "Verify primary key uniqueness"
  
  - name: post_edit_validation
    trigger: "After editing any CSV file in diag_csv/**/"
    rules:
      - task_variable_consistency
      - ui_type_consistency
      - variable_level_validation
      - joint_keys_ref_validation
      - variable_kind_restricted_validation
      - value_source_type_restricted_validation
    actions:
      - "Verify task-variable consistency"
      - "Check UI type references"
      - "Validate level_registered_at and level_belongs_to values"
      - "Check enum_ref, catalogue_ref, generator_ref, note_type_ref (joint keys) references"
      - "Validate variable_kind and value_source_type values"
  
  - name: cross_file_consistency_check
    trigger: "When working with multiple CSV files in the same diagnostic folder"
    rules:
      - enum_variable_validation
      - task_variable_consistency
      - ui_type_consistency
      - joint_keys_ref_validation
    actions:
      - "Verify all enum_ref in variables exist in enums"
      - "Verify all catalogue_ref, generator_ref, note_type_ref in variables exist in catalogues, generators, note_types (joint keys)"
      - "Verify all task_key in variables exist in tasks"
      - "Verify all catalogue_key in tasks exist in catalogues"
      - "Verify all generator_key in tasks exist in generators"

## Skills

skills:
  - name: enum_variable_audit
    description: "Identify enum variables with incomplete enum definitions"
    function: |
      1. Read variables_template.csv
      2. Filter rows where variable_kind in ['enum_single', 'enum_multiple']
      3. For each enum_ref:
         - Count items in enums_template.csv where enum_key == enum_ref
         - If count <= 1, report variable_key
      4. Return list of problematic variables
    output: "List of variable_key values referencing enums with <= 1 items"
  
  - name: csv_sanitization
    description: "Clean CSV files to ensure proper formatting"
    function: |
      1. Read CSV file
      2. For each cell in description columns:
         - Replace commas with semicolons
      3. Ensure all rows have same number of columns
      4. Verify no trailing commas cause column misalignment
    output: "Sanitized CSV content"
  
  - name: reference_integrity_check
    description: "Verify all foreign key references (joint keys) are valid"
    function: |
      1. Load all CSV files in diagnostic folder and template/note_types_template.csv
      2. Extract all primary keys:
         - task_ids from tasks_template.csv
         - variable_keys from variables_template.csv
         - enum_keys from enums_template.csv
         - catalogue_keys from catalogues_template.csv
         - generator_keys from generators_template.csv
         - note_type_keys from note_types_template.csv
      3. Check all references (joint keys and task refs):
         - variables.task_key -> tasks.task_id
         - variables.enum_ref -> enums.enum_key (if not empty)
         - variables.catalogue_ref -> catalogues.catalogue_key (if not empty)
         - variables.generator_ref -> generators.generator_key (if not empty)
         - variables.note_type_ref -> note_types.note_type_key (if not empty)
         - tasks.catalogue_key -> catalogues.catalogue_key
         - tasks.generator_key -> generators.generator_key
         - tasks.note_type_keys (comma-separated) -> note_types.note_type_key
      4. Report broken references
    output: "List of broken foreign key references"
  
  - name: folder_structure_validation
    description: "Verify each folder in diag_csv has all required CSV files and matching structure"
    function: |
      1. Read template folder and extract column headers from each template CSV file
      2. For each folder in diag_csv/*/:
         - Check if all required files exist: tasks_template.csv, variables_template.csv, enums_template.csv, catalogues_template.csv, generators_template.csv
         - For each existing file:
           a. Read header row
           b. Compare with template header (normalize column names, ignore order)
           c. Check for missing columns
           d. Check for extra columns (optional: report as warning)
         - Report missing files
         - Report structure mismatches
      3. Return list of folders with issues and details of mismatches
    output: "List of folders with missing files or structure mismatches, with details"

## Safeguarding Rules

safeguards:
  - name: never_delete_without_backup
    description: "Before deleting any row from CSV files, create a backup comment or log the deletion"
    action: "Log deletion with timestamp and row content"
  
  - name: validate_before_bulk_operations
    description: "Before applying bulk changes, validate the change on a sample first"
    action: "Run validation on sample before applying to all rows"
  
  - name: cross_reference_validation
    description: "After adding/removing tasks, variables, or enums, always run cross-reference validation"
    action: "Run reference_integrity_check after modifications"
  
  - name: enum_item_value_consistency
    description: "When updating enum item values, ensure they remain in English, lowercase, with underscores format"
    action: "Validate format before saving"
  
  - name: description_field_safety
    description: "Always check description fields for commas before saving. Use semicolons as separators within descriptions"
    action: "Run csv_format_validation before saving"

## Double-Check Procedures

double_checks:
  - name: after_adding_new_variables
    steps:
      - "Verify task_key exists in tasks_template.csv"
      - "If enum variable, verify enum_ref exists and has at least 2 items"
      - "Verify description has no commas"
      - "Verify level_registered_at and level_belongs_to are valid hierarchy levels (case, report, property, building, storey, room, building_element, object)"
  
  - name: after_adding_new_tasks
    steps:
      - "Verify ui_type is valid"
      - "If ui_type=catalogue_registration, verify catalogue_key exists"
      - "If ui_type=generator, verify generator_key exists"
      - "If requiredness=always_if, verify condition is set"
  
  - name: after_adding_new_enums
    steps:
      - "Verify all item_value are in English, lowercase, with underscores"
      - "Verify enum has at least 2 items (unless boolean-like)"
      - "Verify no duplicate enum_key + item_value combinations"
  
  - name: before_finalizing
    steps:
      - "Verify each folder has all required CSV files from template folder"
      - "Verify each CSV file structure matches template structure"
      - "Run all validation rules"
      - "Check for orphaned references"
      - "Verify CSV format is correct (no commas in values)"
      - "Verify enum completeness for all enum variables"
      - "Verify all variables have valid level_registered_at and level_belongs_to values"
      - "Verify all enum_ref, catalogue_ref, generator_ref, note_type_ref (joint keys) reference existing enums/catalogues/generators/note_types"
      - "Verify variable_kind is in [boolean, number, string, enum_single, enum_multiple]"
      - "Verify value_source_type is in [user_input, static_default, inherited, computed]"

## Usage Examples

examples:
  - name: finding_incomplete_enums
    query: "Return the name of enum type variables that has 1 or None item_values assigned in the enum_template.csv of the same folder"
    process: |
      1. Read variables_template.csv, filter enum variables
      2. For each enum_ref, count items in enums_template.csv
      3. Return variable_key where count <= 1
    skill: enum_variable_audit
  
  - name: csv_format_check
    query: "Check if the comma is not used inside a column value but to split the column because we work on .csv file"
    process: |
      1. Parse CSV file
      2. For each cell, check if it contains commas
      3. If found, verify it's properly quoted or replace with semicolon
      4. Report locations of problematic commas
    rule: csv_format_validation
    skill: csv_sanitization
  
  - name: folder_structure_check
    query: "Verify each folder in diag_csv has all required CSV files and matching structure"
    process: |
      1. Read template/ folder and extract column headers from each template CSV
      2. For each folder in diag_csv/*/:
         - Check if all required files exist (may be empty)
         - Compare CSV structure with template structure
         - Report missing files or structure mismatches
      3. Return list of folders with issues
    rule: required_files_structure_validation
    skill: folder_structure_validation